<!DOCTYPE html>
<html lang="ne">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kyang Health Post | क्यांग स्वास्थ्य चौकी</title>

<style>

body{
font-family:Arial,"Noto Sans Devanagari",sans-serif;
margin:0;
background:#f5f8fb;
color:#333;
}

header{
background:#075985;
color:white;
padding:25px;
text-align:center;
}

nav{
background:#198754;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
}


.container{
width:90%;
max-width:1100px;
margin:auto;
}


.hero{

height:350px;

background:
linear-gradient(#075985aa,#198754aa),
url("images/kyang-building.jpg");

background-size:cover;

background-position:center;

display:flex;
align-items:center;

color:white;

padding:30px;

}


section{

padding:40px 0;

}


h2{

color:#075985;
text-align:center;

}


.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}


.card{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 3px 10px #ccc;

}


footer{

background:#052c3f;

color:white;

padding:20px;

text-align:center;

}

</style>

</head>


<body>


<header>

<h1>
Kyang Health Post
</h1>

<h2>
क्यांग स्वास्थ्य चौकी
</h2>

<p>
मोदी गाउँपालिका, पर्वत, गण्डकी प्रदेश
</p>

</header>



<nav>

<a href="#services">
Services
</a>

<a href="#notice">
Notice
</a>

<a href="#gallery">
Gallery
</a>

<a href="#staff">
Staff
</a>

</nav>



<div class="hero">

<div>

<h1>
गुणस्तरीय स्वास्थ्य सेवा
</h1>

<p>
Welcome to Kyang Health Post
</p>

</div>

</div>



<section id="services">

<div class="container">

<h2>
हाम्रा सेवाहरू
</h2>


<div id="serviceData" class="cards"></div>


</div>

</section>





<section id="notice">

<div class="container">

<h2>
सूचना
</h2>

<div id="noticeData"></div>

</div>

</section>





<section id="gallery">

<div class="container">

<h2>
फोटो ग्यालरी
</h2>


<div id="galleryData" class="cards"></div>


</div>

</section>





<section id="staff">

<div class="container">

<h2>
कर्मचारी
</h2>


<div id="staffData" class="cards"></div>


</div>

</section>





<footer>

Kyang Health Post
<br>
क्यांग स्वास्थ्य चौकी

</footer>





<script>


const sheet={


services:
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRAIFUSZlO5s0yVHqj1nq2GOjZ8pQEuoiveNm3O-T9qDZdcSKV1295aobAotfNhOq9Uu-nG3afo2m_X/pub?gid=362278335&single=true&output=csv",


notice:
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRAIFUSZlO5s0yVHqj1nq2GOjZ8pQEuoiveNm3O-T9qDZdcSKV1295aobAotfNhOq9Uu-nG3afo2m_X/pub?gid=0&single=true&output=csv",


gallery:
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRAIFUSZlO5s0yVHqj1nq2GOjZ8pQEuoiveNm3O-T9qDZdcSKV1295aobAotfNhOq9Uu-nG3afo2m_X/pub?gid=1348970172&single=true&output=csv",


staff:
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRAIFUSZlO5s0yVHqj1nq2GOjZ8pQEuoiveNm3O-T9qDZdcSKV1295aobAotfNhOq9Uu-nG3afo2m_X/pub?gid=1637724544&single=true&output=csv"


};




async function load(url,id){


let response=
await fetch(url);


let data=
await response.text();


let rows=
data.split("\n").slice(1);



document.getElementById(id).innerHTML=

rows.map(row=>{

return `
<div class="card">
${row.replaceAll(",","<br>")}
</div>
`

}).join("");

}




load(sheet.services,"serviceData");

load(sheet.notice,"noticeData");

load(sheet.gallery,"galleryData");

load(sheet.staff,"staffData");


</script>


</body>

</html>
