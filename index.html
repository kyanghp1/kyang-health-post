<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kyang Health Post | क्यांग स्वास्थ्य चौकी</title>

<meta name="description" content="Official Website of Kyang Health Post, Modi Rural Municipality, Parbat, Gandaki Province, Nepal">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins','Noto Sans Devanagari',sans-serif;
    line-height:1.6;
    color:#333;
    background:#f7f9fc;
}

html{
    scroll-behavior:smooth;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}


/* Top Bar */

.topbar{
    background:#075985;
    color:white;
    padding:10px 0;
    font-size:14px;
}

.topbar .container{
    display:flex;
    justify-content:space-between;
}


/* Header */

header{
    background:white;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    position:sticky;
    top:0;
    z-index:1000;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
}


.logo{
    display:flex;
    align-items:center;
    gap:12px;
}


.logo img{
    width:65px;
}


.logo h1{
    font-size:22px;
    color:#075985;
}

.logo span{
    color:#15803d;
    font-size:16px;
}



nav ul{
    display:flex;
    list-style:none;
    gap:20px;
}


nav a{
    text-decoration:none;
    color:#333;
    font-weight:500;
}


nav a:hover{
    color:#15803d;
}



/* Hero */

.hero{

height:500px;

background:
linear-gradient(
rgba(0,80,120,.75),
rgba(20,120,60,.75)
),
url("https://images.unsplash.com/photo-1584982751601-97dcc096659c")
center/cover;

display:flex;
align-items:center;
color:white;

}


.hero-content{
    width:60%;
}


.hero h2{
    font-size:45px;
    margin-bottom:15px;
}


.hero p{
    font-size:20px;
}


.btn{

display:inline-block;
background:#15803d;
color:white;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
margin-top:25px;

}



/* Sections */

section{
    padding:70px 0;
}


.section-title{

text-align:center;
margin-bottom:40px;

}


.section-title h2{

color:#075985;
font-size:32px;

}


.section-title p{

color:#666;

}


/* Cards */


.cards{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:25px;

}


.card{

background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
text-align:center;

}


.card h3{

color:#075985;
margin:15px 0;

}


.icon{

font-size:45px;

}



/* About */

.about{

background:white;

}


.about-content{

display:grid;
grid-template-columns:1fr 1fr;
gap:40px;

}


/* Notice */


.notice-box{

background:white;
padding:25px;
border-left:5px solid #15803d;
box-shadow:0 5px 15px #ddd;

}


.notice-box li{

margin:10px;

}


/* Staff */

.staff img{

width:120px;
height:120px;
border-radius:50%;
object-fit:cover;

}


/* Gallery */


.gallery{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));
gap:15px;

}


.gallery img{

width:100%;
height:200px;
object-fit:cover;
border-radius:10px;

}


/* Contact */


.contact{

background:#075985;
color:white;

}


.contact h2{

color:white;

}


/* Footer */


footer{

background:#052c3f;
color:white;
padding:40px 0;

}


.footer-grid{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:30px;

}


.copyright{

text-align:center;
margin-top:30px;
border-top:1px solid #555;
padding-top:20px;

}



/* Mobile */

@media(max-width:768px){

.navbar{

flex-direction:column;

}

nav ul{

flex-wrap:wrap;
justify-content:center;

}

.hero-content{

width:100%;

}

.hero h2{

font-size:32px;

}

.about-content{

grid-template-columns:1fr;

}

}


</style>

</head>


<body>
